*{

/* MAIN CARD */

.card{
    width:100%;
    max-width:420px;
    background:linear-gradient(
    180deg,
    #5b6f82,
    #45576a
    );

    border-radius:35px;

    padding:35px 25px;

    text-align:center;

    border:2px solid rgba(255,122,0,.8);

    box-shadow:
    0 0 15px rgba(255,122,0,.4),

    borderPulse 3s infinite alternate;

    position:relative;
}

/* PROFILE */

.profile-wrap{
    width:145px;
    height:145px;
    margin:auto;

    border-radius:50%;

    padding:5px;

    background:
    linear-gradient(
    135deg,
    var(--orange),
    var(--cyan),
    var(--green)
    );

    animation:pulse 2.5s infinite;
}

.profile{
    width:100%;
    height:100%;

}

}

.info{

.info-item{

    color:white;
    font-weight:500;

    border-bottom:1px solid rgba(255,255,255,.12);
}

.info-item:last-child{
    border-bottom:none;
}

.join-text{
    margin-top:18px;

    font-style:italic;

    color:#ffffff;
    opacity:.9;
}

/* BUTTON */

.btn{
    display:block;

    margin-top:28px;

    text-decoration:none;

    color:white;

    font-weight:700;

    padding:18px;

    border-radius:60px;

    background:
    linear-gradient(
    135deg,
    var(--orange),
    var(--green)
    );

    box-shadow:
    0 0 18px rgba(255,122,0,.4),

    animation:float 3s infinite ease-in-out;
}

/* CHANGE TELEGRAM LINK HERE */

href="https://t.me/+76iu6NZF3kM2MTc1"


.btn:hover{

    0 0 25px rgba(255,122,0,.7),
    0 0 50px rgba(0,255,136,.5);
}

/* TIMER */

.timer{
    margin-top:22px;

    color:white;

    font-size:22px;
    font-weight:700;
}

/* DISCLAIMER */

.disclaimer{
    margin-top:18px;

    color:white;

    opacity:.65;

    font-size:12px;

    line-height:1.7;
}

/* ANIMATIONS */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pulse{

    0%{
        box-shadow:
        0 0 15px rgba(255,122,0,.5),
        0 0 30px rgba(0,247,255,.3);
    }

    50%{
        box-shadow:
        0 0 25px rgba(255,122,0,.8),
        0 0 45px rgba(0,247,255,.6);
    }

    100%{
        box-shadow:
        0 0 15px rgba(255,122,0,.5),
        0 0 30px rgba(0,247,255,.3);
    }
}

@keyframes borderPulse{

    from{
        box-shadow:
        0 0 15px rgba(255,122,0,.4),
        0 0 35px rgba(255,122,0,.3);
    }

    to{
        box-shadow:
        0 0 25px rgba(255,122,0,.7),
        0 0 60px rgba(255,122,0,.4);
    }
}

@keyframes float{
    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-4px);
    }

    100%{
        transform:translateY(0);
    }
}

@media(max-width:480px){

        font-size:25px;
    }

}

</style>
